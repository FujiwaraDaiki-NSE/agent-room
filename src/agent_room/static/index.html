<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent Room</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260623-phase-history" />
  </head>
  <body>
    <main class="shell">
      <header class="masthead">
        <section class="topbar">
          <div class="brandBlock">
            <h1>Agent Room</h1>
            <p id="tmuxHelp">tmux</p>
          </div>
          <div class="statusCluster" aria-label="会議状態">
            <span id="roomStatusPill" class="statusPill">下書き</span>
            <span id="agentCountPill" class="statusPill">Agent 0</span>
            <span id="socketStatusPill" class="statusPill">Socketなし</span>
          </div>
          <div class="actions">
            <button id="refresh">Refresh</button>
            <button id="newRoom">New</button>
            <button id="closeRoom" class="danger">Close</button>
          </div>
        </section>

        <section class="briefBar">
          <div class="briefItem">
            <span>目的</span>
            <strong id="briefGoal">下書き</strong>
          </div>
          <div class="briefItem">
            <span>進行役終了条件</span>
            <strong id="briefControllerTermination">下書き</strong>
          </div>
          <div class="briefItem">
            <span>Agent終了条件</span>
            <strong id="briefAgentTermination">下書き</strong>
          </div>
          <div class="briefItem">
            <span>共有文脈</span>
            <strong id="briefShareContexts">なし</strong>
          </div>
        </section>
        <div id="statusLine" class="statusLine" aria-live="polite"></div>
      </header>

      <section class="workspace">
        <section class="stage">
          <aside class="controlRail">
            <section class="controlPanel">
              <div class="sectionHead">
                <h2>設定</h2>
                <span id="setupState">下書き</span>
              </div>
              <label class="field">
              目的
                <textarea id="goal" rows="4"></textarea>
              </label>
              <label class="field">
              進行役終了条件
                <textarea id="controllerTermination" rows="3"></textarea>
              </label>
              <label class="field">
              Agent終了条件
                <textarea id="agentTermination" rows="3"></textarea>
              </label>
              <div>
                <div class="sectionHead">
                  <h2>共有文脈</h2>
                  <span>共有</span>
                </div>
                <div id="shareContextList" class="contextList"></div>
              </div>
              <div>
                <div class="sectionHead">
                  <h2>テンプレート</h2>
                  <div class="sectionActions">
                    <button id="selectAllTemplates" type="button">All</button>
                    <button id="clearTemplates" type="button">Clear</button>
                    <span id="templateCount">0</span>
                  </div>
                </div>
                <div id="templateList" class="templateList"></div>
              </div>
              <div>
                <div class="sectionHead">
                  <h2>チーム</h2>
                  <span id="teamCount">0</span>
                </div>
                <div id="teamList" class="teamList"></div>
              </div>
              <button id="startRoom" class="primary">Start</button>
            </section>

            <section class="meetingStatusPanel">
              <div class="sectionHead">
                <h2>会議</h2>
                <span id="meetingStatusUpdated">保留</span>
              </div>
              <div class="meetingStatusBody">
                <div class="statusPair">
                  <span>フェーズ</span>
                  <strong id="meetingPhase">下書き</strong>
                </div>
                <div class="statusPair">
                  <span>論点</span>
                  <strong id="meetingTopic">なし</strong>
                </div>
                <div class="statusBlock">
                  <span>要約</span>
                  <p id="meetingSummary">保留</p>
                </div>
                <div class="statusBlock">
                  <span>遷移</span>
                  <div id="meetingTransitions" class="meetingTransitions">保留</div>
                </div>
                <div class="statusBlock">
                  <span>決定</span>
                  <ul id="meetingDecisions" class="statusList"></ul>
                </div>
                <div class="statusBlock">
                  <span>未解決</span>
                  <ul id="meetingOpenQuestions" class="statusList"></ul>
                </div>
                <div class="statusBlock">
                  <span>次</span>
                  <p id="meetingNext">進行役</p>
                </div>
              </div>
            </section>

            <section class="rosterPanel">
              <div class="sectionHead">
                <h2>Agent</h2>
                <span id="activeAgentCount">稼働 0</span>
              </div>
              <div id="agentRoster" class="agentRoster"></div>
            </section>
          </aside>

          <section class="roomDeck">
            <div class="roomToolbar">
              <div>
                <h2>会議室</h2>
                <span id="roomState">待機</span>
              </div>
              <div class="deployBar">
                <label class="srOnly" for="deployTemplate">Agent投入</label>
                <select id="deployTemplate"></select>
                <button id="deployAgent">Deploy</button>
              </div>
            </div>

            <div class="tableWrap">
              <div class="roundTable">
                <div class="tableCore">
                  <span id="tableState">待機</span>
                </div>
                <div id="agentLayer"></div>
              </div>
            </div>
            <div id="progressStrip" class="progressStrip">進捗</div>
          </section>
        </section>

        <aside class="sidebar">
          <div class="railTabs" role="tablist" aria-label="発言">
            <button id="messagesTab" class="active" type="button" role="tab" aria-selected="true" aria-controls="messagesPanel">Messages</button>
            <button id="controllerTab" type="button" role="tab" aria-selected="false" aria-controls="controllerPanel">Controller</button>
          </div>

          <section id="messagesPanel" class="chatPanel active" role="tabpanel" aria-labelledby="messagesTab">
            <div class="sidebarHead">
              <h2>発言</h2>
              <span id="activeRoom">Roomなし</span>
            </div>
            <div id="messages" class="messages" role="log" aria-live="polite" aria-relevant="additions text" aria-label="公開発言" tabindex="0"></div>
            <div class="composer">
              <label class="srOnly" for="messageText">発言</label>
              <textarea id="messageText" rows="2" placeholder="発言"></textarea>
              <button id="sendMessage" aria-label="Send public message">Send</button>
            </div>
          </section>

          <section id="controllerPanel" class="chatPanel" role="tabpanel" aria-labelledby="controllerTab" hidden>
            <div class="sidebarHead">
              <h2>進行役</h2>
              <span>非公開</span>
            </div>
            <div id="controllerMessages" class="messages" role="log" aria-live="polite" aria-relevant="additions text" aria-label="進行役への非公開発言" tabindex="0"></div>
            <div class="composer">
              <label class="srOnly" for="controllerText">非公開</label>
              <textarea id="controllerText" rows="2" placeholder="非公開"></textarea>
              <button id="sendControllerMessage" aria-label="Send controller whisper">Send</button>
            </div>
          </section>
        </aside>
      </section>
    </main>
    <script src="/static/app.js?v=20260623-phase-history"></script>
  </body>
</html>
